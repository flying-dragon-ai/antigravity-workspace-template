<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="RepoBrain logo">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#241D45"/>
      <stop offset="60%" stop-color="#14112A"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </radialGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect width="640" height="640" rx="144" fill="url(#bgGlow)"/>
  <rect x="6" y="6" width="628" height="628" rx="138" fill="none" stroke="#3B3663" stroke-width="3"/>

  <!-- soft glow behind brain -->
  <ellipse cx="330" cy="320" rx="240" ry="190" fill="#8B5CF6" opacity="0.12"/>

  <!-- brain outline (side view, facing left): graph mesh -->
  <g stroke="url(#edgeGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M156 330 L172 254 L232 196 L318 162 L406 164 L470 198 L506 260 L510 326 L484 378 L496 416 L452 452 L400 448 L316 446 L236 416 L178 376 Z"/>
    <!-- brain stem -->
    <path d="M452 452 L430 492" opacity="0.8"/>
    <!-- diagonal central sulcus groove -->
    <path d="M352 166 C330 240 310 300 306 360 C303 392 308 420 312 444" opacity="0.7"/>
  </g>

  <!-- internal edges -->
  <g stroke="#7C6FF0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M172 254 L246 262 L232 196"/>
    <path d="M246 262 L226 330 L156 330"/>
    <path d="M226 330 L266 386 L236 416"/>
    <path d="M266 386 L316 446"/>
    <path d="M226 330 L178 376"/>
    <path d="M246 262 L318 162" opacity="0.5"/>
    <path d="M406 164 L398 244 L470 198"/>
    <path d="M398 244 L448 306 L506 260"/>
    <path d="M448 306 L510 326"/>
    <path d="M448 306 L404 380 L484 378"/>
    <path d="M404 380 L400 448"/>
    <path d="M404 380 L452 452" opacity="0.5"/>
    <path d="M398 244 L404 380"/>
  </g>

  <!-- nodes: outline -->
  <g fill="url(#nodeGlow)">
    <circle cx="156" cy="330" r="13"/>
    <circle cx="172" cy="254" r="13"/>
    <circle cx="232" cy="196" r="13"/>
    <circle cx="318" cy="162" r="13"/>
    <circle cx="406" cy="164" r="13"/>
    <circle cx="470" cy="198" r="13"/>
    <circle cx="506" cy="260" r="13"/>
    <circle cx="510" cy="326" r="13"/>
    <circle cx="484" cy="378" r="12"/>
    <circle cx="496" cy="416" r="11"/>
    <circle cx="452" cy="452" r="12"/>
    <circle cx="400" cy="448" r="12"/>
    <circle cx="316" cy="446" r="13"/>
    <circle cx="236" cy="416" r="13"/>
    <circle cx="178" cy="376" r="13"/>
    <circle cx="430" cy="492" r="10"/>
  </g>
  <!-- nodes: internal (brighter) -->
  <g fill="#E9E4FF">
    <circle cx="246" cy="262" r="10"/>
    <circle cx="226" cy="330" r="10"/>
    <circle cx="266" cy="386" r="10"/>
    <circle cx="398" cy="244" r="10"/>
    <circle cx="448" cy="306" r="10"/>
    <circle cx="404" cy="380" r="10"/>
